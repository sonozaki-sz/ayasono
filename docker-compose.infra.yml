# インフラ用 Compose ファイル
# 用途: XServer VPS 上で Portainer 管理 UI + Cloudflare Tunnel を起動・管理する
# 起動:  docker compose -f /opt/infra/docker-compose.infra.yml -p infra up -d
# 停止:  docker compose -f /opt/infra/docker-compose.infra.yml -p infra down
#
# このファイルを /opt/infra/docker-compose.infra.yml としてサーバーに配置すること。
# 環境変数: /opt/infra/.env に CLOUDFLARE_TUNNEL_TOKEN を設定すること。
# セットアップ手順: docs/guides/DEPLOYMENT.md

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - portainer
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  portainer_data:
