name: Discord Notify

on:
  workflow_run:
    workflows:
      - Deploy
    types:
      - completed

jobs:
  notify-success:
    name: Discord通知（成功）
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Discord に成功通知を送信
        run: |
          curl -fsSL -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [
                {
                  "title": "✅ デプロイに成功しました",
                  "color": 5763719,
                  "fields": [
                    {
                      "name": "リポジトリ",
                      "value": "[ayasono](https://github.com/${{ github.repository }})",
                      "inline": false
                    },
                    {
                      "name": "Portainer",
                      "value": "Stack: [ayasono](https://${{ secrets.PORTAINER_HOST }}/#!/${{ secrets.PORTAINER_ENDPOINT_ID }}/docker/stacks/ayasono?id=${{ secrets.PORTAINER_STACK_ID }}&type=2)",
                      "inline": false
                    }
                  ],
                  "timestamp": "${{ github.event.workflow_run.updated_at }}"
                }
              ]
            }'

  notify-failure:
    name: Discord通知（失敗）
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Discord に失敗通知を送信
        run: |
          curl -fsSL -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [
                {
                  "title": "❌ デプロイに失敗しました",
                  "color": 16711680,
                  "fields": [
                    {
                      "name": "理由",
                      "value": "[🔗 失敗したワークフローを確認](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})",
                      "inline": false
                    },
                    {
                      "name": "手動ロールバック",
                      "value": "Portainer で前回の SHA タグを指定して再デプロイ",
                      "inline": false
                    },
                    {
                      "name": "Portainer",
                      "value": "Stack: [ayasono](https://${{ secrets.PORTAINER_HOST }}/#!/${{ secrets.PORTAINER_ENDPOINT_ID }}/docker/stacks/ayasono?id=${{ secrets.PORTAINER_STACK_ID }}&type=2)",
                      "inline": false
                    }
                  ],
                  "timestamp": "${{ github.event.workflow_run.updated_at }}"
                }
              ]
            }'
