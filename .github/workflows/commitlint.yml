name: Commit Lint

# コミットメッセージを Conventional Commits 形式で検証する
# - develop への直接 push: push されたコミット範囲を検証
# - main/develop 向け PR: PR に含まれるコミット範囲を検証
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # 全コミット履歴を取得するために fetch-depth を 0 にする
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: コミットメッセージの検証（push）
        if: github.event_name == 'push'
        run: pnpm exec commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --verbose

      - name: コミットメッセージの検証（PR）
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
