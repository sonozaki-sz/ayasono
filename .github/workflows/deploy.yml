name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'prisma/**'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Docker Buildx セットアップ
        uses: docker/setup-buildx-action@v4

      - name: GHCR にログイン
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker イメージをビルドして GHCR にプッシュ
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          target: runner
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Portainer Stack を再デプロイ（環境変数を保持）
        run: |
          PORTAINER_URL="${{ secrets.PORTAINER_URL }}"
          STACK_ID="${{ secrets.PORTAINER_STACK_ID }}"
          ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}"
          API_KEY="${{ secrets.PORTAINER_API_KEY }}"

          # 現在の Stack から環境変数を取得
          ENV_VARS=$(curl -fsSL \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}" \
            -H "X-API-Key: ${API_KEY}" \
            | jq '.Env // []')

          # 環境変数を含めて再デプロイ
          curl -fsSL -X PUT \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}/git/redeploy?endpointId=${ENDPOINT_ID}" \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --argjson env "$ENV_VARS" '{
              pullImage: true,
              repositoryReferenceName: "refs/heads/main",
              env: $env
            }')"

      - name: 古い Docker イメージを削除（最新3つを保持）
        run: |
          PORTAINER_URL="${{ secrets.PORTAINER_URL }}"
          ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}"
          API_KEY="${{ secrets.PORTAINER_API_KEY }}"
          IMAGE_NAME="ghcr.io/sonozaki-sz/ayasono"
          KEEP_COUNT=3

          # Portainer Docker API 経由で対象イメージ一覧を取得
          IMAGES=$(curl -fsSL \
            "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/images/json?all=false" \
            -H "X-API-Key: ${API_KEY}" \
            | jq --arg name "$IMAGE_NAME" '
              [ .[] | select(
                (.RepoTags != null and any(.RepoTags[]; startswith($name))) or
                (.RepoDigests != null and any(.RepoDigests[]; startswith($name)))
              )]
              | sort_by(.Created) | reverse
            ')

          TOTAL=$(echo "$IMAGES" | jq 'length')
          echo "対象イメージ数: ${TOTAL}（保持: ${KEEP_COUNT}）"

          if [ "$TOTAL" -le "$KEEP_COUNT" ]; then
            echo "削除対象なし"
            exit 0
          fi

          # 古いイメージを削除（KEEP_COUNT 番目以降）
          echo "$IMAGES" | jq -r ".[$KEEP_COUNT:][].Id" | while read -r IMAGE_ID; do
            echo "削除: ${IMAGE_ID}"
            curl -fsSL -X DELETE \
              "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/images/${IMAGE_ID}?force=false" \
              -H "X-API-Key: ${API_KEY}" || echo "⚠ 削除スキップ（使用中の可能性）: ${IMAGE_ID}"
          done
