name: CI / Deploy

# main/developへの直接push、またはmain/develop向けPRで実行
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  # ─────────────────────────────────────────────
  # CI: 型チェック・テスト
  #   - PR時のみ実行（push to mainはPRでCIが通過済みのためスキップ）
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: Prisma Client 生成
        run: pnpm db:generate

      - name: 型チェック
        run: pnpm typecheck

      - name: テスト実行
        run: pnpm test

  # ─────────────────────────────────────────────
  # CD: デプロイ（mainへの直接push、またはmain向けPRのマージ完了時のみ）
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write # イメージのプッシュ・削除に必要

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCR にログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker イメージをビルドして GHCR にプッシュ
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: docker-compose.prod.yml を VPS に転送
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/ayasono/

      - name: SSH でデプロイ
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/ayasono
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker logout ghcr.io
            # pull 後に残るダングリングイメージを削除
            docker image prune -f
            echo "==> デプロイ完了: $(date '+%Y-%m-%d %H:%M:%S %Z')"

  # ─────────────────────────────────────────────
  # Discord 通知（成功）
  #   - main への push でデプロイが成功した場合のみ
  # ─────────────────────────────────────────────
  notify-success:
    name: Discord通知（成功）
    needs: deploy
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Discord に成功通知を送信
        run: |
          curl -fsSL -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [
                {
                  "title": "✅ デプロイに成功しました",
                  "color": 5763719,
                  "fields": [
                    {
                      "name": "リポジトリ",
                      "value": "[ayasono](https://github.com/${{ github.repository }})",
                      "inline": false
                    },
                    {
                      "name": "Portainer",
                      "value": "Container: [ayasono-bot](http://${{ secrets.PORTAINER_HOST }}:9000/#!/${{ secrets.PORTAINER_ENDPOINT_ID }}/docker/containers)",
                      "inline": false
                    }
                  ],
                  "timestamp": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }'

  # ─────────────────────────────────────────────
  # Discord 通知（失敗）
  #   - main への push で test または deploy が失敗した場合のみ
  # ─────────────────────────────────────────────
  notify-failure:
    name: Discord通知（失敗）
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.test.result == 'failure' || needs.deploy.result == 'failure') &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: 失敗したジョブを特定して Discord に通知
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            FAILED_JOB="test (Test)"
          else
            FAILED_JOB="deploy (Deploy to VPS)"
          fi

          curl -fsSL -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [
                {
                  \"title\": \"❌ デプロイに失敗しました\",
                  \"color\": 16711680,
                  \"fields\": [
                    {
                      \"name\": \"理由\",
                      \"value\": \"ジョブ: \`${FAILED_JOB}\`\n[🔗 失敗したワークフローを確認](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
                      \"inline\": false
                    },
                    {
                      \"name\": \"リポジトリ\",
                      \"value\": \"[ayasono](https://github.com/${{ github.repository }})\",
                      \"inline\": false
                    },
                    {
                      \"name\": \"Portainer\",
                      \"value\": \"Container: [ayasono-bot](http://${{ secrets.PORTAINER_HOST }}:9000/#!/${{ secrets.PORTAINER_ENDPOINT_ID }}/docker/containers)\",
                      \"inline\": false
                    }
                  ],
                  \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"
                }
              ]
            }"
